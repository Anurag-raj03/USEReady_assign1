name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/useready:backend \
            -f docker/Dockerfile.backend .

      - name: Build Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/useready:frontend \
            -f docker/Dockerfile.frontend .

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/useready:backend

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/useready:frontend