version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: rental_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: always

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: rental_frontend
    ports:
      - "8501:8501"
    depends_on:
      - backend
    restart: always